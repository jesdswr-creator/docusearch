name: Build DocuSearch

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  QT_VERSION: '6.7.3'
  QT_ARCH: 'win64_msvc2019_64'

jobs:
  build-windows:
    name: Build on Windows Server 2022
    runs-on: windows-2022
    # Bumped from 120 to 240 minutes because Poppler + Tesseract +
    # Leptonica are heavy ports that take ~30-40 min to compile from
    # source on first run (subsequent runs hit the vcpkg binary cache
    # and are much faster).
    timeout-minutes: 240

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Set up MSVC developer environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Qt via aqtinstall
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install aqtinstall
          Write-Host "=== Available architectures for Qt $env:QT_VERSION ==="
          python -m aqt list-qt windows desktop --arch $env:QT_VERSION
          python -m aqt install-qt windows desktop $env:QT_VERSION $env:QT_ARCH -O C:\Qt
          $msvcRoot = "C:\Qt\$env:QT_VERSION\$env:QT_ARCH"
          if (-not (Test-Path $msvcRoot)) {
            $msvcRoot = Get-ChildItem -Path "C:\Qt" -Filter "msvc*" -Directory -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
          }
          if (-not $msvcRoot -or -not (Test-Path $msvcRoot)) { throw "Qt MSVC dir not found" }
          $qtBin = Join-Path $msvcRoot "bin"
          Write-Host "Qt root: $msvcRoot"
          Get-ChildItem $qtBin -Filter "Qt6*" -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  $($_.Name)" }
          Get-ChildItem $qtBin -Filter "windeployqt*" -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  $($_.Name)" }
          echo "QtInstallDir=$msvcRoot" >> $env:GITHUB_ENV
          echo "$qtBin" >> $env:GITHUB_PATH

      - name: Set up vcpkg
        shell: pwsh
        run: |
          # Use the vcpkg pre-installed on GitHub-hosted Windows runners
          # (C:\vcpkg). It's already bootstrapped.
          echo "VCPKG_ROOT=C:\vcpkg" >> $env:GITHUB_ENV
          echo "C:\vcpkg" >> $env:GITHUB_PATH
          & C:\vcpkg\vcpkg.exe --version

      - name: Install WiX v4 (pinned to avoid v7 OSMF EULA)
        shell: pwsh
        run: |
          # Pin to WiX v4.0.5 — WiX v7 requires accepting the OSMF EULA
          # which fails non-interactively on CI. v4 has no such restriction.
          dotnet tool install -g wix --version 4.0.5
          echo "$env:USERPROFILE\.dotnet\tools" >> $env:GITHUB_PATH
          # Pre-fetch the UI extension so wix build can resolve it offline
          & "$env:USERPROFILE\.dotnet\tools\wix.exe" extension add WixToolset.UI.wixext/4.0.5
          & "$env:USERPROFILE\.dotnet\tools\wix.exe" --version

      # NOTE: vcpkg dependencies (sqlite3, tesseract, leptonica, poppler, zlib)
      # are installed automatically by CMake via the vcpkg manifest (vcpkg.json)
      # when we configure with -DCMAKE_TOOLCHAIN_FILE=vcpkg.cmake. No need for
      # a separate `vcpkg install` step.

      - name: Configure CMake (this also installs vcpkg deps from vcpkg.json)
        shell: pwsh
        run: |
          # Tesseract + Poppler are now ENABLED so the app can:
          #   * Extract text from born-digital PDFs (Poppler)
          #   * OCR scanned PDFs and images (Tesseract)
          # Previously both were OFF, which meant PDFs flagged as
          # "needsOcr" but OCR was unavailable, so PDFs were effectively
          # unsearchable.
          cmake -B build -S . `
            -DCMAKE_TOOLCHAIN_FILE="C:\vcpkg\scripts\buildsystems\vcpkg.cmake" `
            -DCMAKE_PREFIX_PATH="$env:QtInstallDir" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DVCPKG_MANIFEST_MODE=ON `
            -DDOCUSEARCH_BUILD_TESTS=ON `
            -DDOCUSEARCH_ENABLE_TESSERACT=ON `
            -DDOCUSEARCH_ENABLE_POPPLER=ON
          Write-Host "=== vcpkg installed packages ==="
          & C:\vcpkg\vcpkg.exe list

      - name: Build (Release)
        shell: pwsh
        run: cmake --build build --config Release --parallel

      - name: Run unit tests
        shell: pwsh
        run: ctest --test-dir build --output-on-failure -C Release
        continue-on-error: true

      - name: Bundle Qt DLLs (windeployqt) + Tesseract/Poppler DLLs
        shell: pwsh
        run: |
          $wdq = Join-Path $env:QtInstallDir "bin\windeployqt.exe"
          & $wdq --release --no-translations --no-system-d3d-compiler --no-opengl-sw --no-quick-import --compiler-runtime build\bin\Release\DocuSearch.exe
          # CRITICAL: windeployqt doesn't detect Qt6Sql dependency because
          # QSqlDatabase is loaded dynamically. We must add it manually.
          $qtBin = Join-Path $env:QtInstallDir "bin"
          Copy-Item "$qtBin\Qt6Sql.dll" "build\bin\Release\Qt6Sql.dll" -Force
          # Also ensure the SQLite driver plugin is bundled
          $pluginDir = "build\bin\Release\sqldrivers"
          if (-not (Test-Path $pluginDir)) { New-Item -ItemType Directory -Path $pluginDir -Force | Out-Null }
          Copy-Item "$qtBin\..\plugins\sqldrivers\qsqlite.dll" "$pluginDir\qsqlite.dll" -Force
          # Also copy Qt6Concurrent and Qt6Network (used by the app)
          Copy-Item "$qtBin\Qt6Concurrent.dll" "build\bin\Release\Qt6Concurrent.dll" -Force -ErrorAction SilentlyContinue
          Copy-Item "$qtBin\Qt6Network.dll" "build\bin\Release\Qt6Network.dll" -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path build\bin\Release\themes | Out-Null
          Copy-Item -Path resources\themes\*.qss -Destination build\bin\Release\themes -Force

          # ---- Bundle non-Qt DLLs: Tesseract, Leptonica, Poppler, and
          # their transitive dependencies (installed by vcpkg into
          # build\bin\Release already by CMake's install step, but we
          # copy them again here to be sure). windeployqt only handles
          # Qt DLLs - it doesn't know about vcpkg-installed libraries.
          # We use dumpbin /dependents to discover the DLLs DocuSearch.exe
          # imports, then copy any that match the vcpkg bin dir. ----
          $vcpkgBin = "C:\vcpkg\installed\x64-windows\bin"
          if (Test-Path $vcpkgBin) {
            Write-Host "=== Copying vcpkg runtime DLLs from $vcpkgBin ==="
            # Tesseract + Leptonica + Poppler + their deps. We copy the
            # well-known names explicitly (more reliable than parsing
            # dumpbin output, which can miss indirect deps).
            $runtimeDlls = @(
              'tesseract54.dll',
              'leptonica-1.84.0.dll',
              'lept-1.84.0.dll',
              'poppler-cpp.dll',
              'poppler.dll',
              'openjp2.dll',
              'jpeg62.dll',
              'libjpeg.dll',
              'png16.dll',
              'libpng16.dll',
              'tiff.dll',
              'libtiff.dll',
              'tiffxx.dll',
              'zstd.dll',
              'libzstd.dll',
              'lzma.dll',
              'liblzma.dll',
              'brotlidec.dll',
              'brotlicommon.dll',
              'brotli.dll',
              'freetype.dll',
              'fontconfig-1.dll',
              'expat.dll',
              'libexpat.dll',
              'iconv-2.dll',
              'libiconv.dll',
              'charset-1.dll',
              'libcharset.dll',
              'gobject-2.0.dll',
              'glib-2.0.dll',
              'gio-2.0.dll',
              'pcre.dll',
              'libpcre.dll',
              'pcre2-8.dll',
              'libpcre2-8.dll',
              'harfbuzz.dll',
              'libharfbuzz.dll',
              'libwebp.dll',
              'webp.dll',
              'libwebpmux.dll',
              'webpmux.dll',
              'libwebpdemux.dll',
              'webpdemux.dll',
              'gif.dll',
              'libgif.dll',
              'lcms2.dll',
              'liblcms2.dll',
              'curl.dll',
              'libcurl.dll',
              'OpenCL.dll',
              'cairo.dll',
              'pixman-1.dll',
              'libpng.dll'
            )
            $copied = 0
            foreach ($dll in $runtimeDlls) {
              $src = Join-Path $vcpkgBin $dll
              if (Test-Path $src) {
                Copy-Item $src "build\bin\Release\$dll" -Force
                $copied++
              }
            }
            Write-Host "Copied $copied runtime DLLs from vcpkg."

            # Fallback: also copy every *.dll that mentions "tesseract",
            # "lept", "poppler", "openjp", "jpeg", "png", "tiff", "freetype",
            # "fontconfig" in its name. This catches version-suffixed names
            # we might have missed in the explicit list above.
            Get-ChildItem -Path $vcpkgBin -Filter "*.dll" | Where-Object {
              $_.Name -match 'tesseract|lept|poppler|openjp|jpeg|png|tiff|freetype|fontconfig|lcms|webp|gif|zstd|lzma|brotli|expat|iconv|charset|harfbuzz|pixman|cairo'
            } | ForEach-Object {
              $dst = "build\bin\Release\$($_.Name)"
              if (-not (Test-Path $dst)) {
                Copy-Item $_.FullName $dst -Force
                Write-Host "  (fallback) Copied $($_.Name)"
              }
            }
          } else {
            Write-Host "WARNING: vcpkg bin dir not found at $vcpkgBin - OCR/Poppler DLLs may be missing from the bundle."
          }

          # ---- Bundle eng.traineddata so OCR works out-of-the-box. ----
          # Download from the official Tesseract GitHub mirror. The file
          # is ~10 MB and contains English language data. Users who need
          # other languages can download more .traineddata files and drop
          # them into the tessdata folder.
          $tessdataDir = "build\bin\Release\tessdata"
          if (-not (Test-Path $tessdataDir)) {
            New-Item -ItemType Directory -Path $tessdataDir -Force | Out-Null
          }
          $engFile = Join-Path $tessdataDir "eng.traineddata"
          if (-not (Test-Path $engFile)) {
            Write-Host "=== Downloading eng.traineddata (~10 MB) ==="
            $engUrl = "https://github.com/tesseract-ocr/tessdata_fast/raw/main/eng.traineddata"
            try {
              Invoke-WebRequest -Uri $engUrl -OutFile $engFile -UseBasicParsing -TimeoutSec 60
              Write-Host "Downloaded eng.traineddata ($((Get-Item $engFile).Length) bytes)"
            } catch {
              Write-Host "WARNING: Failed to download eng.traineddata: $($_.Exception.Message)"
              Write-Host "OCR will still work if the user manually downloads .traineddata files"
              Write-Host "into the tessdata folder and points Settings > OCR > Tessdata path at it."
            }
          }

      - name: Build portable ZIP
        shell: pwsh
        run: |
          # Create a portable ZIP directly from the windeployqt output.
          # This is simpler than MSI/MSIX and works on any Windows 10/11 PC
          # without installation - just unzip and double-click DocuSearch.exe.
          $portableZip = Join-Path (Get-Location) "dist\DocuSearch-1.0.0.0-portable.zip"
          $distDir = Split-Path $portableZip -Parent
          if (-not (Test-Path $distDir)) { New-Item -ItemType Directory -Path $distDir | Out-Null }
          if (Test-Path $portableZip) { Remove-Item $portableZip -Force }
          # Stage files - exclude tst_*.exe test binaries
          $stagingDir = "build\portable-staging"
          if (Test-Path $stagingDir) { Remove-Item $stagingDir -Recurse -Force }
          New-Item -ItemType Directory -Path $stagingDir -Force | Out-Null
          Get-ChildItem -Path "build\bin\Release" | Where-Object {
              $_.Name -notlike "tst_*"
          } | Copy-Item -Destination $stagingDir -Recurse -Force
          Compress-Archive -Path "$stagingDir\*" -DestinationPath $portableZip -CompressionLevel Optimal
          Write-Host "Created portable ZIP: $portableZip"
          Write-Host "Contents:"
          Get-ChildItem $stagingDir | Format-Table Name

      - name: Harvest build output (generate DocuSearch.Harvest.wxs)
        shell: pwsh
        run: |
          # Generate a WiX v4 fragment file enumerating every file in
          # build\bin\Release (Qt DLLs, plugins, themes) so the MSI
          # bundles them. We do this in PowerShell rather than
          # `wix heat dir` because in WiX v4.0.5 heat is not a built-in
          # subcommand of the wix CLI (it requires installing the
          # WixToolset.Heat.wixext extension separately, adding CI flakiness).
          & pwsh -File scripts\generate-harvest.ps1
          if (-not (Test-Path "installer\DocuSearch.Harvest.wxs")) {
            throw "Harvest file was not generated"
          }

      - name: Build MSI installer (WiX v4)
        shell: pwsh
        run: |
          $env:Path += ";$env:USERPROFILE\.dotnet\tools"
          $wxsMain = "installer\DocuSearch.wxs"
          $wxsHarvest = "installer\DocuSearch.Harvest.wxs"
          $msiOut = Join-Path (Get-Location) "dist\DocuSearch-Setup-1.0.0.0.msi"
          if (-not (Test-Path "dist")) { New-Item -ItemType Directory -Path "dist" | Out-Null }
          # Build MSI: pass both the main wxs and the harvested wxs as inputs.
          # -ext WixToolset.UI.wixext enables <ui:WixUI> for the install wizard.
          & wix build $wxsMain $wxsHarvest -o $msiOut `
            -d "BuildOutputDir=build\bin\Release" `
            -ext WixToolset.UI.wixext
          if (-not (Test-Path $msiOut)) { throw "MSI was not produced at $msiOut" }
          Write-Host "=== MSI created: $msiOut ==="
          Get-Item $msiOut | Format-List Name, Length, LastWriteTime

      - name: Upload portable ZIP (the main deliverable)
        uses: actions/upload-artifact@v5
        with:
          name: DocuSearch-portable
          path: dist/DocuSearch-1.0.0.0-portable.zip
          if-no-files-found: error
          retention-days: 30

      - name: Upload MSI installer
        uses: actions/upload-artifact@v5
        with:
          name: DocuSearch-Setup-msi
          path: dist/DocuSearch-Setup-1.0.0.0.msi
          if-no-files-found: error
          retention-days: 30

      - name: Upload bare exe folder (debugging)
        uses: actions/upload-artifact@v5
        with:
          name: DocuSearch-bin
          path: build/bin/Release/
          if-no-files-found: error
          retention-days: 7
