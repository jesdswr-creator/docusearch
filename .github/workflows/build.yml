name: Build DocuSearch

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  QT_VERSION: '6.7.3'

jobs:
  build-windows:
    name: Build on Windows Server 2022
    runs-on: windows-2022
    timeout-minutes: 120

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Set up MSVC developer environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Qt via aqtinstall
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install aqtinstall
          $qtDir = "C:\Qt"
          Write-Host "Installing Qt $env:QT_VERSION win64_msvc2022_64 to $qtDir"
          python -m aqt install-qt windows desktop $env:QT_VERSION win64_msvc2022_64 -m qtcore qtgui qtwidgets qtconcurrent qtsql qtnetwork qtsvg -O $qtDir
          $qtRoot = Get-ChildItem "$qtDir\*" -Directory | Select-Object -First 1 -ExpandProperty FullName
          $msvcRoot = Join-Path $qtRoot "msvc2022_64"
          Write-Host "Qt MSVC root: $msvcRoot"
          if (-not (Test-Path $msvcRoot)) { throw "Qt MSVC dir not found at $msvcRoot" }
          $qtBin = Join-Path $msvcRoot "bin"
          echo "QtInstallDir=$msvcRoot" >> $env:GITHUB_ENV
          echo "Qt5_DIR=$msvcRoot" >> $env:GITHUB_ENV
          echo "$qtBin" >> $env:GITHUB_PATH

      - name: Cache vcpkg
        uses: actions/cache@v5
        with:
          path: |
            C:\vcpkg\installed
            ~/.cache/vcpkg
          key: vcpkg-win-${{ hashFiles('vcpkg.json') }}-v2
          restore-keys: |
            vcpkg-win-

      - name: Install vcpkg
        shell: pwsh
        run: |
          if (-not (Test-Path "C:\vcpkg")) {
            git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
          }
          & C:\vcpkg\bootstrap-vcpkg.bat -disableMetrics
          echo "VCPKG_ROOT=C:\vcpkg" >> $env:GITHUB_ENV
          echo "C:\vcpkg" >> $env:GITHUB_PATH

      - name: Install C++ libraries via vcpkg
        shell: pwsh
        run: |
          & C:\vcpkg\vcpkg.exe install `
            sqlite3[fts5]:x64-windows `
            tesseract:x64-windows `
            leptonica:x64-windows `
            poppler:x64-windows `
            zlib:x64-windows

      - name: Install WiX v4
        shell: pwsh
        run: |
          dotnet tool install -g wix
          echo "$env:USERPROFILE\.dotnet\tools" >> $env:GITHUB_PATH

      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -B build -S . `
            -DCMAKE_TOOLCHAIN_FILE="C:\vcpkg\scripts\buildsystems\vcpkg.cmake" `
            -DCMAKE_PREFIX_PATH="$env:QtInstallDir" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DDOCUSEARCH_BUILD_TESTS=ON

      - name: Build (Release)
        shell: pwsh
        run: cmake --build build --config Release --parallel

      - name: Run unit tests
        shell: pwsh
        run: ctest --test-dir build --output-on-failure -C Release
        continue-on-error: true

      - name: Bundle Qt DLLs (windeployqt)
        shell: pwsh
        run: |
          $wdq = Join-Path $env:QtInstallDir "bin\windeployqt.exe"
          & $wdq --release --no-translations --no-system-d3d-compiler --no-opengl-sw --no-quick-import --no-webkit2 --compiler-runtime build\bin\Release\DocuSearch.exe
          New-Item -ItemType Directory -Force -Path build\bin\Release\themes | Out-Null
          Copy-Item -Path resources\themes\*.qss -Destination build\bin\Release\themes -Force

      - name: Build MSI + MSIX + ZIP
        shell: pwsh
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts\build-release.ps1 -MakeMsi -MakeMsix -Zip -BuildDir build -Version 1.0.0.0
        env:
          QtPath: ${{ env.QtInstallDir }}

      - name: Upload MSI installer
        uses: actions/upload-artifact@v5
        with:
          name: DocuSearch-Setup-msi
          path: dist/DocuSearch-Setup-1.0.0.0.msi
          if-no-files-found: warn
          retention-days: 30

      - name: Upload MSIX package
        uses: actions/upload-artifact@v5
        with:
          name: DocuSearch-msix
          path: dist/DocuSearch-1.0.0.0-x64.msix
          if-no-files-found: warn
          retention-days: 30

      - name: Upload portable ZIP
        uses: actions/upload-artifact@v5
        with:
          name: DocuSearch-portable
          path: dist/DocuSearch-1.0.0.0-portable.zip
          if-no-files-found: warn
          retention-days: 30

      - name: Upload bare exe folder (debugging)
        uses: actions/upload-artifact@v5
        with:
          name: DocuSearch-bin
          path: build/bin/Release/
          if-no-files-found: error
          retention-days: 7
