name: Build DocuSearch

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  QT_VERSION: '6.7.3'
  QT_ARCH: 'win64_msvc2019_64'

jobs:
  build-windows:
    name: Build on Windows Server 2022
    runs-on: windows-2022
    timeout-minutes: 120

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Set up MSVC developer environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Qt via aqtinstall
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install aqtinstall
          Write-Host "=== Available architectures for Qt $env:QT_VERSION ==="
          python -m aqt list-qt windows desktop --arch $env:QT_VERSION
          python -m aqt install-qt windows desktop $env:QT_VERSION $env:QT_ARCH -O C:\Qt
          $msvcRoot = "C:\Qt\$env:QT_VERSION\$env:QT_ARCH"
          if (-not (Test-Path $msvcRoot)) {
            $msvcRoot = Get-ChildItem -Path "C:\Qt" -Filter "msvc*" -Directory -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
          }
          if (-not $msvcRoot -or -not (Test-Path $msvcRoot)) { throw "Qt MSVC dir not found" }
          $qtBin = Join-Path $msvcRoot "bin"
          Write-Host "Qt root: $msvcRoot"
          Get-ChildItem $qtBin -Filter "Qt6*" -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  $($_.Name)" }
          Get-ChildItem $qtBin -Filter "windeployqt*" -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  $($_.Name)" }
          echo "QtInstallDir=$msvcRoot" >> $env:GITHUB_ENV
          echo "$qtBin" >> $env:GITHUB_PATH

      - name: Set up vcpkg
        shell: pwsh
        run: |
          # Use the vcpkg pre-installed on GitHub-hosted Windows runners
          # (C:\vcpkg). It's already bootstrapped.
          echo "VCPKG_ROOT=C:\vcpkg" >> $env:GITHUB_ENV
          echo "C:\vcpkg" >> $env:GITHUB_PATH
          & C:\vcpkg\vcpkg.exe --version

      - name: Install WiX v4
        shell: pwsh
        run: |
          dotnet tool install -g wix
          echo "$env:USERPROFILE\.dotnet\tools" >> $env:GITHUB_PATH

      # NOTE: vcpkg dependencies (sqlite3, tesseract, leptonica, poppler, zlib)
      # are installed automatically by CMake via the vcpkg manifest (vcpkg.json)
      # when we configure with -DCMAKE_TOOLCHAIN_FILE=vcpkg.cmake. No need for
      # a separate `vcpkg install` step.

      - name: Configure CMake (this also installs vcpkg deps from vcpkg.json)
        shell: pwsh
        run: |
          cmake -B build -S . `
            -DCMAKE_TOOLCHAIN_FILE="C:\vcpkg\scripts\buildsystems\vcpkg.cmake" `
            -DCMAKE_PREFIX_PATH="$env:QtInstallDir" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DVCPKG_MANIFEST_MODE=ON `
            -DDOCUSEARCH_BUILD_TESTS=ON
          Write-Host "=== vcpkg installed packages ==="
          & C:\vcpkg\vcpkg.exe list

      - name: Build (Release)
        shell: pwsh
        run: cmake --build build --config Release --parallel

      - name: Run unit tests
        shell: pwsh
        run: ctest --test-dir build --output-on-failure -C Release
        continue-on-error: true

      - name: Bundle Qt DLLs (windeployqt)
        shell: pwsh
        run: |
          $wdq = Join-Path $env:QtInstallDir "bin\windeployqt.exe"
          & $wdq --release --no-translations --no-system-d3d-compiler --no-opengl-sw --no-quick-import --no-webkit2 --compiler-runtime build\bin\Release\DocuSearch.exe
          New-Item -ItemType Directory -Force -Path build\bin\Release\themes | Out-Null
          Copy-Item -Path resources\themes\*.qss -Destination build\bin\Release\themes -Force

      - name: Build MSI + MSIX + ZIP
        shell: pwsh
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts\build-release.ps1 -MakeMsi -MakeMsix -Zip -BuildDir build -Version 1.0.0.0
        env:
          QtPath: ${{ env.QtInstallDir }}

      - name: Upload MSI installer
        uses: actions/upload-artifact@v5
        with:
          name: DocuSearch-Setup-msi
          path: dist/DocuSearch-Setup-1.0.0.0.msi
          if-no-files-found: warn
          retention-days: 30

      - name: Upload MSIX package
        uses: actions/upload-artifact@v5
        with:
          name: DocuSearch-msix
          path: dist/DocuSearch-1.0.0.0-x64.msix
          if-no-files-found: warn
          retention-days: 30

      - name: Upload portable ZIP
        uses: actions/upload-artifact@v5
        with:
          name: DocuSearch-portable
          path: dist/DocuSearch-1.0.0.0-portable.zip
          if-no-files-found: warn
          retention-days: 30

      - name: Upload bare exe folder (debugging)
        uses: actions/upload-artifact@v5
        with:
          name: DocuSearch-bin
          path: build/bin/Release/
          if-no-files-found: error
          retention-days: 7
