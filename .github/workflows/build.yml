name: Build DocuSearch

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  QT_VERSION: '6.7.3'
  QT_ARCH: 'win64_msvc2019_64'

jobs:
  build-windows:
    name: Build on Windows Server 2022
    runs-on: windows-2022
    timeout-minutes: 120

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Set up MSVC developer environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Qt via aqtinstall
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install aqtinstall
          Write-Host "=== Available architectures for Qt $env:QT_VERSION ==="
          python -m aqt list-qt windows desktop --arch $env:QT_VERSION
          python -m aqt install-qt windows desktop $env:QT_VERSION $env:QT_ARCH -O C:\Qt
          $msvcRoot = "C:\Qt\$env:QT_VERSION\$env:QT_ARCH"
          if (-not (Test-Path $msvcRoot)) {
            $msvcRoot = Get-ChildItem -Path "C:\Qt" -Filter "msvc*" -Directory -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
          }
          if (-not $msvcRoot -or -not (Test-Path $msvcRoot)) { throw "Qt MSVC dir not found" }
          $qtBin = Join-Path $msvcRoot "bin"
          Write-Host "Qt root: $msvcRoot"
          Get-ChildItem $qtBin -Filter "Qt6*" -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  $($_.Name)" }
          Get-ChildItem $qtBin -Filter "windeployqt*" -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  $($_.Name)" }
          echo "QtInstallDir=$msvcRoot" >> $env:GITHUB_ENV
          echo "$qtBin" >> $env:GITHUB_PATH

      - name: Set up vcpkg
        shell: pwsh
        run: |
          # Use the vcpkg pre-installed on GitHub-hosted Windows runners
          # (C:\vcpkg). It's already bootstrapped.
          echo "VCPKG_ROOT=C:\vcpkg" >> $env:GITHUB_ENV
          echo "C:\vcpkg" >> $env:GITHUB_PATH
          & C:\vcpkg\vcpkg.exe --version

      - name: Install WiX v4 (pinned to avoid v7 OSMF EULA)
        shell: pwsh
        run: |
          # Pin to WiX v4.0.5 — WiX v7 requires accepting the OSMF EULA
          # which fails non-interactively on CI. v4 has no such restriction.
          dotnet tool install -g wix --version 4.0.5
          echo "$env:USERPROFILE\.dotnet\tools" >> $env:GITHUB_PATH
          # Pre-fetch the UI extension so wix build can resolve it offline
          & "$env:USERPROFILE\.dotnet\tools\wix.exe" extension add WixToolset.UI.wixext/4.0.5
          & "$env:USERPROFILE\.dotnet\tools\wix.exe" --version

      # NOTE: vcpkg dependencies (sqlite3, tesseract, leptonica, poppler, zlib)
      # are installed automatically by CMake via the vcpkg manifest (vcpkg.json)
      # when we configure with -DCMAKE_TOOLCHAIN_FILE=vcpkg.cmake. No need for
      # a separate `vcpkg install` step.

      - name: Configure CMake (this also installs vcpkg deps from vcpkg.json)
        shell: pwsh
        run: |
          cmake -B build -S . `
            -DCMAKE_TOOLCHAIN_FILE="C:\vcpkg\scripts\buildsystems\vcpkg.cmake" `
            -DCMAKE_PREFIX_PATH="$env:QtInstallDir" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DVCPKG_MANIFEST_MODE=ON `
            -DDOCUSEARCH_BUILD_TESTS=ON `
            -DDOCUSEARCH_ENABLE_TESSERACT=OFF `
            -DDOCUSEARCH_ENABLE_POPPLER=OFF
          Write-Host "=== vcpkg installed packages ==="
          & C:\vcpkg\vcpkg.exe list

      - name: Build (Release)
        shell: pwsh
        run: cmake --build build --config Release --parallel

      - name: Run unit tests
        shell: pwsh
        run: ctest --test-dir build --output-on-failure -C Release
        continue-on-error: true

      - name: Bundle Qt DLLs (windeployqt)
        shell: pwsh
        run: |
          $wdq = Join-Path $env:QtInstallDir "bin\windeployqt.exe"
          & $wdq --release --no-translations --no-system-d3d-compiler --no-opengl-sw --no-quick-import --compiler-runtime build\bin\Release\DocuSearch.exe
          # CRITICAL: windeployqt doesn't detect Qt6Sql dependency because
          # QSqlDatabase is loaded dynamically. We must add it manually.
          $qtBin = Join-Path $env:QtInstallDir "bin"
          Copy-Item "$qtBin\Qt6Sql.dll" "build\bin\Release\Qt6Sql.dll" -Force
          # Also ensure the SQLite driver plugin is bundled
          $pluginDir = "build\bin\Release\sqldrivers"
          if (-not (Test-Path $pluginDir)) { New-Item -ItemType Directory -Path $pluginDir -Force | Out-Null }
          Copy-Item "$qtBin\..\plugins\sqldrivers\qsqlite.dll" "$pluginDir\qsqlite.dll" -Force
          # Also copy Qt6Concurrent and Qt6Network (used by the app)
          Copy-Item "$qtBin\Qt6Concurrent.dll" "build\bin\Release\Qt6Concurrent.dll" -Force -ErrorAction SilentlyContinue
          Copy-Item "$qtBin\Qt6Network.dll" "build\bin\Release\Qt6Network.dll" -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path build\bin\Release\themes | Out-Null
          Copy-Item -Path resources\themes\*.qss -Destination build\bin\Release\themes -Force

      - name: Build portable ZIP
        shell: pwsh
        run: |
          # Create a portable ZIP directly from the windeployqt output.
          # This is simpler than MSI/MSIX and works on any Windows 10/11 PC
          # without installation - just unzip and double-click DocuSearch.exe.
          $portableZip = Join-Path (Get-Location) "dist\DocuSearch-1.0.0.0-portable.zip"
          $distDir = Split-Path $portableZip -Parent
          if (-not (Test-Path $distDir)) { New-Item -ItemType Directory -Path $distDir | Out-Null }
          if (Test-Path $portableZip) { Remove-Item $portableZip -Force }
          # Stage files - exclude tst_*.exe test binaries
          $stagingDir = "build\portable-staging"
          if (Test-Path $stagingDir) { Remove-Item $stagingDir -Recurse -Force }
          New-Item -ItemType Directory -Path $stagingDir -Force | Out-Null
          Get-ChildItem -Path "build\bin\Release" | Where-Object {
              $_.Name -notlike "tst_*"
          } | Copy-Item -Destination $stagingDir -Recurse -Force
          Compress-Archive -Path "$stagingDir\*" -DestinationPath $portableZip -CompressionLevel Optimal
          Write-Host "Created portable ZIP: $portableZip"
          Write-Host "Contents:"
          Get-ChildItem $stagingDir | Format-Table Name

      - name: Harvest build output with WiX heat
        shell: pwsh
        run: |
          $env:Path += ";$env:USERPROFILE\.dotnet\tools"
          $harvestOut = "installer\DocuSearch.Harvest.wxs"
          # Harvest everything in build\bin\Release (Qt DLLs, plugins, themes, etc.)
          # -cg HarvestedFiles    ComponentGroup name to emit
          # -dr BinFolder         DirectoryRef to attach files to (ProgramFiles\DocuSearch\bin)
          # -sreg                 Skip registry harvesting (no .reg files here)
          # -srd                  Suppress the root directory wrapper (we use BinFolder directly)
          # -var var.BuildOutputDir  Use $(var.BuildOutputDir) for Source paths
          # -t installer\heat-filter.xsl  Exclude DocuSearch.exe (already in main wxs)
          & wix heat dir "build\bin\Release" -o $harvestOut `
            -cg HarvestedFiles -dr BinFolder `
            -sreg -srd -var var.BuildOutputDir `
            -t installer\heat-filter.xsl
          Write-Host "=== Harvested file: $harvestOut ==="
          Get-Content $harvestOut | Select-Object -First 30

      - name: Build MSI installer (WiX v4)
        shell: pwsh
        run: |
          $env:Path += ";$env:USERPROFILE\.dotnet\tools"
          $wxsMain = "installer\DocuSearch.wxs"
          $wxsHarvest = "installer\DocuSearch.Harvest.wxs"
          $msiOut = Join-Path (Get-Location) "dist\DocuSearch-Setup-1.0.0.0.msi"
          if (-not (Test-Path "dist")) { New-Item -ItemType Directory -Path "dist" | Out-Null }
          # Build MSI: pass both the main wxs and the harvested wxs as inputs.
          # -ext WixToolset.UI.wixext enables <ui:WixUI> for the install wizard.
          & wix build $wxsMain $wxsHarvest -o $msiOut `
            -d "BuildOutputDir=build\bin\Release" `
            -ext WixToolset.UI.wixext
          if (-not (Test-Path $msiOut)) { throw "MSI was not produced at $msiOut" }
          Write-Host "=== MSI created: $msiOut ==="
          Get-Item $msiOut | Format-List Name, Length, LastWriteTime

      - name: Upload portable ZIP (the main deliverable)
        uses: actions/upload-artifact@v5
        with:
          name: DocuSearch-portable
          path: dist/DocuSearch-1.0.0.0-portable.zip
          if-no-files-found: error
          retention-days: 30

      - name: Upload MSI installer
        uses: actions/upload-artifact@v5
        with:
          name: DocuSearch-Setup-msi
          path: dist/DocuSearch-Setup-1.0.0.0.msi
          if-no-files-found: error
          retention-days: 30

      - name: Upload bare exe folder (debugging)
        uses: actions/upload-artifact@v5
        with:
          name: DocuSearch-bin
          path: build/bin/Release/
          if-no-files-found: error
          retention-days: 7
