# ============================================================
# build.yml — Continuous build for DocuSearch on Windows
# ============================================================
# Runs on every push and every pull request. Produces:
#   - DocuSearch.exe (with bundled Qt DLLs)
#   - DocuSearch-Setup-1.0.0.0.msi
#   - DocuSearch-1.0.0.0-x64.msix
#   - DocuSearch-1.0.0.0-portable.zip
#
# All artifacts are uploaded to the Actions run page where you can
# download them (even from a phone or tablet).
#
# Free for public repositories — GitHub provides unlimited Windows
# runner minutes for open-source projects.
# ============================================================

name: Build DocuSearch

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  QT_VERSION: '6.7.0'
  VCPKG_REF: '2024.01.12'

jobs:
  build-windows:
    name: Build on Windows Server 2022
    runs-on: windows-2022
    timeout-minutes: 90

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MSVC developer environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # ---- Cache vcpkg binary packages so subsequent builds are fast ----
      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            C:\vcpkg\installed
            ~/.cache/vcpkg
          key: vcpkg-${{ runner.os }}-${{ env.VCPKG_REF }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ env.VCPKG_REF }}-

      # ---- Install Qt 6.7 via aqtinstall (much faster than the official installer) ----
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          modules: 'qtcore qtgui qtwidgets qtconcurrent qtsql qtnetwork qtsvg'
          cache: true

      # ---- vcpkg pulls SQLite (with FTS5), Tesseract, Leptonica, Poppler ----
      - name: Install vcpkg dependencies
        run: |
          git clone https://github.com/microsoft/vcpkg.git C:\vcpkg 2>$null
          C:\vcpkg\bootstrap-vcpkg.bat -disableMetrics
          echo "VCPKG_ROOT=C:\vcpkg" >> $env:GITHUB_ENV
          echo "C:\vcpkg" >> $env:GITHUB_PATH

      - name: Install C++ libraries via vcpkg
        run: |
          C:\vcpkg\vcpkg.exe install `
            sqlite3[fts5]:x64-windows `
            tesseract:x64-windows `
            leptonica:x64-windows `
            poppler:x64-windows `
            zlib:x64-windows

      - name: Install WiX v4 (for MSI packaging)
        run: dotnet tool install -g wix

      - name: Configure CMake
        run: |
          cmake -B build -S . `
            -DCMAKE_TOOLCHAIN_FILE="C:\vcpkg\scripts\buildsystems\vcpkg.cmake" `
            -DCMAKE_PREFIX_PATH="${{ env.QtInstallDir }}" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DDOCUSEARCH_BUILD_TESTS=ON

      - name: Build (Release)
        run: cmake --build build --config Release --parallel

      - name: Run unit tests
        run: ctest --test-dir build --output-on-failure -C Release
        continue-on-error: false

      - name: Bundle Qt DLLs (windeployqt)
        run: |
          & "${{ env.QtInstallDir }}\bin\windeployqt.exe" --release `
            --no-translations --no-system-d3d-compiler --no-opengl-sw `
            --no-quick-import --no-webkit2 --compiler-runtime `
            build\bin\Release\DocuSearch.exe
          # Copy theme overrides next to the exe
          New-Item -ItemType Directory -Force -Path build\bin\Release\themes | Out-Null
          Copy-Item -Path resources\themes\*.qss -Destination build\bin\Release\themes -Force

      - name: Build MSI installer
        run: |
          $env:Path += ";$env:USERPROFILE\.dotnet\tools"
          powershell -NoProfile -ExecutionPolicy Bypass `
            -File scripts\build-release.ps1 `
            -MakeMsi -MakeMsix -Zip `
            -BuildDir build `
            -Version 1.0.0.0
        env:
          QtPath: ${{ env.QtInstallDir }}

      # ---- Upload everything as GitHub Actions artifacts ----
      - name: Upload portable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: DocuSearch-portable
          path: dist/DocuSearch-1.0.0.0-portable.zip
          if-no-files-found: error
          retention-days: 30

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: DocuSearch-Setup-msi
          path: dist/DocuSearch-Setup-1.0.0.0.msi
          if-no-files-found: warn
          retention-days: 30

      - name: Upload MSIX package
        uses: actions/upload-artifact@v4
        with:
          name: DocuSearch-msix
          path: dist/DocuSearch-1.0.0.0-x64.msix
          if-no-files-found: warn
          retention-days: 30

      - name: Upload bare exe folder (debugging)
        uses: actions/upload-artifact@v4
        with:
          name: DocuSearch-bin
          path: build/bin/Release/
          if-no-files-found: error
          retention-days: 7
