# ============================================================
# release.yml — Publish a GitHub Release with built binaries
# ============================================================
# Triggered when you push a tag like "v1.0.0":
#
#   git tag v1.0.0
#   git push origin v1.0.0
#
# The workflow:
#   1. Builds DocuSearch on a Windows 2022 runner (same as build.yml)
#   2. Creates a GitHub Release named "DocuSearch v1.0.0"
#   3. Attaches the .msi, .msix, and portable .zip as release assets
#
# Anyone can then download the binaries from:
#   https://github.com/<your-username>/<repo>/releases/latest
# ============================================================

name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write   # required to create the GitHub Release

env:
  QT_VERSION: '6.7.0'

jobs:
  build-and-release:
    name: Build and publish GitHub Release
    runs-on: windows-2022
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse version from tag
        id: ver
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"           # strip leading 'v'
          echo "tag=$TAG"        >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Resolved tag=$TAG version=$VERSION"

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            C:\vcpkg\installed
          key: vcpkg-${{ runner.os }}-release-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          modules: 'qtcore qtgui qtwidgets qtconcurrent qtsql qtnetwork qtsvg'
          cache: true

      - name: Install vcpkg + C++ libraries
        run: |
          git clone https://github.com/microsoft/vcpkg.git C:\vcpkg 2>$null
          C:\vcpkg\bootstrap-vcpkg.bat -disableMetrics
          echo "VCPKG_ROOT=C:\vcpkg" >> $env:GITHUB_ENV
          C:\vcpkg\vcpkg.exe install `
            sqlite3[fts5]:x64-windows `
            tesseract:x64-windows `
            leptonica:x64-windows `
            poppler:x64-windows `
            zlib:x64-windows

      - name: Install WiX v4
        run: dotnet tool install -g wix

      - name: Configure + Build + Test
        run: |
          cmake -B build -S . `
            -DCMAKE_TOOLCHAIN_FILE="C:\vcpkg\scripts\buildsystems\vcpkg.cmake" `
            -DCMAKE_PREFIX_PATH="${{ env.QtInstallDir }}" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DDOCUSEARCH_BUILD_TESTS=ON
          cmake --build build --config Release --parallel
          ctest --test-dir build --output-on-failure -C Release

      - name: Bundle Qt DLLs
        run: |
          & "${{ env.QtInstallDir }}\bin\windeployqt.exe" --release `
            --no-translations --no-system-d3d-compiler --no-opengl-sw `
            --no-quick-import --no-webkit2 --compiler-runtime `
            build\bin\Release\DocuSearch.exe
          New-Item -ItemType Directory -Force -Path build\bin\Release\themes | Out-Null
          Copy-Item -Path resources\themes\*.qss -Destination build\bin\Release\themes -Force

      - name: Package MSI + MSIX + ZIP
        run: |
          $env:Path += ";$env:USERPROFILE\.dotnet\tools"
          powershell -NoProfile -ExecutionPolicy Bypass `
            -File scripts\build-release.ps1 `
            -MakeMsi -MakeMsix -Zip `
            -BuildDir build `
            -Version ${{ steps.ver.outputs.version }}
        env:
          QtPath: ${{ env.QtInstallDir }}

      # ---- Rename artifacts to include the version tag ----
      - name: Stage release assets
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          Copy-Item "dist\DocuSearch-Setup-${{ steps.ver.outputs.version }}.msi" `
                    "release-assets\DocuSearch-Setup-${{ steps.ver.outputs.version }}.msi"
          Copy-Item "dist\DocuSearch-${{ steps.ver.outputs.version }}-x64.msix" `
                    "release-assets\DocuSearch-${{ steps.ver.outputs.version }}-x64.msix"
          Copy-Item "dist\DocuSearch-${{ steps.ver.outputs.version }}-portable.zip" `
                    "release-assets\DocuSearch-${{ steps.ver.outputs.version }}-portable.zip"
          Get-ChildItem release-assets

      - name: Generate release notes
        id: notes
        shell: bash
        run: |
          cat > RELEASE_NOTES.md <<EOF
          # DocuSearch ${{ steps.ver.outputs.version }}
          
          **Offline Intelligent Document Search & OCR System for Windows 11**
          
          ## Downloads
          
          | File | Description |
          |------|-------------|
          | \`DocuSearch-Setup-${{ steps.ver.outputs.version }}.msi\` | Windows installer (recommended). Double-click to install. Adds Start Menu shortcut + file associations. |
          | \`DocuSearch-${{ steps.ver.outputs.version }}-x64.msix\` | Modern MSIX package. Install via PowerShell: \`Add-AppxPackage DocuSearch-${{ steps.ver.outputs.version }}-x64.msix\`. Requires a trusted code-signing certificate. |
          | \`DocuSearch-${{ steps.ver.outputs.version }}-portable.zip\` | No-install build. Unzip anywhere and run \`DocuSearch.exe\`. |
          
          ## System Requirements
          
          - Windows 10 1809+ (Windows 11 recommended for Mica backdrop)
          - x64 architecture
          - 8 GB RAM
          - ~200 MB disk space (plus space for the search database)
          
          ## First Launch
          
          1. Open **Tools → Settings → Indexing**
          2. Add drives/folders to index (e.g. \`D:\\\`)
          3. Add excluded folders (e.g. \`D:\\Movies\`)
          4. Click OK — indexing runs in the background
          5. Search bar is live after Phase 1 completes (a few seconds)
          
          ## Tesseract OCR
          
          Download \`eng.traineddata\` from <https://github.com/tesseract-ocr/tessdata>
          and place in \`C:\\Program Files\\Tesseract-OCR\\tessdata\\\` or specify a
          custom path in **Settings → OCR**.
          
          ---
          Built from commit \`$GITHUB_SHA\` on \`$GITHUB_REF\`.
          EOF
          echo "path=RELEASE_NOTES.md" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: DocuSearch ${{ steps.ver.outputs.tag }}
          body_path: ${{ steps.notes.outputs.path }}
          files: release-assets/*
          draft: false
          prerelease: false
          generate_release_notes: false
